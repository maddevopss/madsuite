name: CI

on:
  push:
    branches: [main, master, "V5.2", "feature/**", "fix/**", "refactor/**"]
  pull_request:
    branches: [main, master, "V5.2"]

jobs:
  backend:
    name: Backend — Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: madsuite_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      TEST_DATABASE_URL: postgresql://test_user:test_password@localhost:5432/madsuite_test
      JWT_SECRET: test-secret-key-minimum-32-chars-ok!
      REDIS_DISABLED: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Run tests
        run: npm test -- --runInBand --forceExit

  frontend:
    name: Frontend — Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

  desktop:
    name: Desktop Agent — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop-agent

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: desktop-agent/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand --forceExit
        env:
          NODE_ENV: test
          JEST_WORKER_ID: "1"
