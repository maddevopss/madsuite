name: Aggregator Smoke

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Repository smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate root metadata
        run: |
          test -s README.md
          node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))"

      - name: Validate expected repository layout
        run: |
          test -d frontend
          test -d backend
          test -d desktop-agent
          test -d e2e

      - name: Validate delegated package manifests
        run: |
          node -e "JSON.parse(require('fs').readFileSync('frontend/package.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('backend/package.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('desktop-agent/package.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('e2e/package.json', 'utf8'))"

      - name: Explain CI scope
        run: |
          echo "This repository is an aggregator snapshot."
          echo "Full CI runs live in the dedicated frontend, backend, desktop-agent and e2e repositories."
