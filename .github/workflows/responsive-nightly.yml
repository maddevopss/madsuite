name: Responsive Nightly Extended

on:
  schedule:
    # Chaque nuit à 7h UTC (2h du matin EST)
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  responsive-nightly:
    name: Responsive Tests — Multi-Browser Nightly
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 1234
          POSTGRES_DB: madsuite_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      TEST_DATABASE_URL: postgresql://postgres:1234@localhost:5432/madsuite_test
      JWT_SECRET: test-secret-madsuite-1234567890-ABC
      REDIS_DISABLED: "true"
      TEST_BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium webkit

      - name: Start backend server
        run: npm run start:test --prefix backend &
        env:
          NODE_ENV: test
          PORT: 5000

      - name: Wait for backend to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:5000/health > /dev/null 2>&1; then
              echo "✅ Backend is ready"
              exit 0
            fi
            echo "⏳ Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "❌ Backend failed to start"
          exit 1

      - name: Start frontend dev server
        run: npm run dev --prefix frontend &
        env:
          VITE_API_URL: http://localhost:5000

      - name: Wait for frontend to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ Frontend is ready"
              exit 0
            fi
            echo "⏳ Waiting for frontend... ($i/30)"
            sleep 2
          done
          echo "❌ Frontend failed to start"
          exit 1

      - name: Run responsive tests — Chromium desktop
        working-directory: e2e
        run: npx playwright test --project=chromium-desktop --reporter=list

      - name: Run responsive tests — WebKit mobile
        working-directory: e2e
        run: npx playwright test --project=webkit-mobile --reporter=list

      - name: Run responsive tests — Chromium mobile
        working-directory: e2e
        run: npx playwright test --project=chromium-mobile --reporter=list

      - name: Run responsive tests — Firefox
        working-directory: e2e
        run: npx playwright test --project=firefox

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-responsive-nightly-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 14

      - name: Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-responsive-traces
          path: test-results/
          retention-days: 7
