services:
  postgres:
    image: postgres:16
    container_name: madsuite-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: madsuite_local
      POSTGRES_DB: madsuite_local
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d madsuite_local"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - madsuite-local-postgres-data:/var/lib/postgresql/data

volumes:
  madsuite-local-postgres-data:
